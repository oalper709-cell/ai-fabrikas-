name: Docker images

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - Dockerfile
      - Dockerfile.web
      - docker-compose.prod.yml
      - apps/**
      - packages/**
      - package.json
      - package-lock.json

jobs:
  build-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: api
          push: false
          tags: ai-fabrikasi-api:ci
          cache-from: type:gha
          cache-to: type:gha,mode=max
      - name: Build Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: worker
          push: false
          tags: ai-fabrikasi-worker:ci
          cache-from: type:gha
          cache-to: type:gha,mode=max
      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: false
          tags: ai-fabrikasi-web:ci
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:4000/v1
          cache-from: type:gha
          cache-to: type:gha,mode=max
