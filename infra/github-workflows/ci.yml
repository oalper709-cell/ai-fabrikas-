name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run build --workspace=@ai-fabrikasi/shared
      - run: npm run typecheck --workspace=@ai-fabrikasi/shared
      - run: npm run typecheck --workspace=@ai-fabrikasi/api
      - run: npm run typecheck --workspace=@ai-fabrikasi/worker
      - run: npm run typecheck --workspace=@ai-fabrikasi/web
